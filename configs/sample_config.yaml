      - name: "Build login page"
        parallel: true
        depends_on:
          - "Backend API/Implement auth endpoints"
        days: 3
      - name: "Add responsive styles"
        days: 2

  - name: "Data Pipeline"
    tasks:
      - name: "Design ETL architecture"
        days: 3
      - name: "Implement data ingestion"
        days: 5
      - name: "Build transformation layer"
        days: 4
      - name: "Setup monitoring"
        days: 2
